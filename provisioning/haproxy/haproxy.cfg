global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend http_front
    bind *:80
    
    # Matching prefixes
    acl is_users path_beg /api/users
    acl is_products path_beg /api/products
    acl is_orders path_beg /api/orders

    use_backend users_back if is_users
    use_backend products_back if is_products
    use_backend orders_back if is_orders

backend users_back
    balance roundrobin
    http-request set-path %[path,regsub(^/api/users/?,/)]
    server users1 192.168.80.12:3001 check
    server users2 192.168.80.12:3011 check

backend products_back
    balance roundrobin
    http-request set-path %[path,regsub(^/api/products/?,/)]
    server products1 192.168.80.12:3002 check
    server products2 192.168.80.12:3012 check

backend orders_back
    balance roundrobin
    http-request set-path %[path,regsub(^/api/orders/?,/)]
    server orders1 192.168.80.12:3003 check
    server orders2 192.168.80.12:3013 check

listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin123
