<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Store - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin: 0;
    }
    .login-wrapper {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .login-wrapper h2 {
      font-weight: 600;
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: 1px;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #0b5ed7;
      color: #fff;
      box-shadow: 0 0 0 0.25rem rgba(11, 94, 215, 0.25);
    }
    .btn-primary {
      background-color: #4a4aff;
      border: none;
      padding: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #3b3be6;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(74, 74, 255, 0.4);
    }
    label {
      font-size: 0.9rem;
      font-weight: 300;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <h2>Micro Store</h2>
  <form id="login-form">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter username" required>
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required>
    </div>
    <div class="d-grid gap-2">
      <button type="button" class="btn btn-primary" onclick="handleLogin()">Sign In</button>
    </div>
  </form>
</div>

<script src="static/scriptUsers.js"></script>
</body>
</html>
