apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-config
  namespace: microapp
data:
  users-init.sql: |
    CREATE DATABASE IF NOT EXISTS myflaskapp;
    USE myflaskapp;
    CREATE TABLE IF NOT EXISTS users (
        id int NOT NULL AUTO_INCREMENT PRIMARY KEY,
        name varchar(255),
        email varchar(255),
        username varchar(255),
        password varchar(255)
    );
    INSERT INTO users VALUES(null, "juan", "juan@gmail.com", "juan", "123"),(null, "maria", "maria@gmail.com", "maria", "456");

  products-init.sql: |
    CREATE DATABASE IF NOT EXISTS products_db;
    USE products_db;
    CREATE TABLE IF NOT EXISTS products (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        price FLOAT NOT NULL,
        quantity INT NOT NULL
    );
    INSERT INTO products (name, price, quantity) VALUES ('Laptop', 1000.0, 50), ('Mouse', 25.0, 200), ('Keyboard', 45.0, 150);

  orders-init.sql: |
    CREATE DATABASE IF NOT EXISTS orders_db;
    USE orders_db;
    CREATE TABLE IF NOT EXISTS orders (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_name VARCHAR(100) NOT NULL,
        user_email VARCHAR(100) NOT NULL,
        total FLOAT NOT NULL,
        date DATETIME DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS order_items (
        id INT AUTO_INCREMENT PRIMARY KEY,
        order_id INT NOT NULL,
        product_id INT NOT NULL,
        price FLOAT NOT NULL,
        quantity INT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES orders(id)
    );
