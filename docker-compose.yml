version: "3.8"

services:
  consul:
    image: hashicorp/consul:1.15.4
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0 -ui"

  mysql_users:
    image: mysql:8.0
    container_name: mysql_users
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15

  mysql_products:
    image: mysql:8.0
    container_name: mysql_products
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./init-products.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15

  mysql_orders:
    image: mysql:8.0
    container_name: mysql_orders
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - ./init-orders.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15

  users_service:
    build: ./microUsers
    container_name: users_service
    ports:
      - "3001:3001"
    environment:
      - MYSQL_HOST=mysql_users
      - CONSUL_HOST=consul
    depends_on:
      mysql_users:
        condition: service_healthy
      consul:
        condition: service_started

  users_service_2:
    build: ./microUsers
    container_name: users_service_2
    ports:
      - "3011:3001"
    environment:
      - MYSQL_HOST=mysql_users
      - CONSUL_HOST=consul
    depends_on:
      mysql_users:
        condition: service_healthy
      consul:
        condition: service_started

  products_service:
    build: ./microProducts
    container_name: products_service
    ports:
      - "3002:3002"
    environment:
      - MYSQL_HOST=mysql_products
      - CONSUL_HOST=consul
    depends_on:
      mysql_products:
        condition: service_healthy
      consul:
        condition: service_started

  products_service_2:
    build: ./microProducts
    container_name: products_service_2
    ports:
      - "3012:3002"
    environment:
      - MYSQL_HOST=mysql_products
      - CONSUL_HOST=consul
    depends_on:
      mysql_products:
        condition: service_healthy
      consul:
        condition: service_started

  orders_service:
    build: ./microOrders
    container_name: orders_service
    ports:
      - "3003:3003"
    environment:
      - MYSQL_HOST=mysql_orders
      - CONSUL_HOST=consul
    depends_on:
      mysql_orders:
        condition: service_healthy
      consul:
        condition: service_started

  orders_service_2:
    build: ./microOrders
    container_name: orders_service_2
    ports:
      - "3013:3003"
    environment:
      - MYSQL_HOST=mysql_orders
      - CONSUL_HOST=consul
    depends_on:
      mysql_orders:
        condition: service_healthy
      consul:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5001:5001"
    environment:
      - FLASK_APP=run.py
    depends_on:
      - users_service
      - products_service
      - orders_service
